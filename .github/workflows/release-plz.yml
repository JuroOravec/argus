# Fork: open/update the release PR only (version bumps + changelog).
# Does not publish to crates.io or npm — binaries come from release.yml; npm stays manual if needed.
name: Release

permissions:
  pull-requests: write
  contents: write

on:
  push:
    branches:
      - main

jobs:
  release-plz:
    name: Release-plz (release PR only)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Create / update release PR
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          # GH_PAT triggers CI on the opened PR; GITHUB_TOKEN works but may not fire workflows on the bot PR.
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
