name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'argus-ai-v*'

env:
  CARGO_TERM_COLOR: always
  # Strip debug symbols and enable LTO for smaller release binaries (~8MB vs ~35MB unstripped)
  CARGO_PROFILE_RELEASE_STRIP: symbols
  CARGO_PROFILE_RELEASE_LTO: true
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 1

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.os != 'windows-latest'
        run: |
          BINARY=target/${{ matrix.target }}/release/argus
          if [ ! -f "$BINARY" ]; then
            echo "Binary not found at $BINARY" && exit 1
          fi
          tar czf argus-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release argus

      - name: Package (windows)
        if: matrix.os == 'windows-latest'
        run: |
          if (-not (Test-Path "target/${{ matrix.target }}/release/argus.exe")) {
            Write-Error "Binary not found"; exit 1
          }
          7z a argus-${{ matrix.target }}.zip target/${{ matrix.target }}/release/argus.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: argus-${{ matrix.target }}
          path: argus-${{ matrix.target }}.*

  upload:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload binaries to existing release
        run: gh release upload ${{ github.ref_name }} artifacts/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
