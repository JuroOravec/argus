name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'argus-ai-v*'

env:
  CARGO_TERM_COLOR: always
  # Strip symbols + LTO reduce size (Linux binaries are ~28 MB stripped vs ~35 MB unstripped; varies by target).
  CARGO_PROFILE_RELEASE_STRIP: symbols
  CARGO_PROFILE_RELEASE_LTO: true
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 1

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          # musl builds: statically linked, no GLIBC dependency — run on any Linux distro
          # regardless of libc version. Required for the coder containers (Debian Bookworm
          # ships GLIBC 2.36, but the gnu binaries require 2.39+).
          # use_cross=true: delegate to `cross`, which uses a pre-built Docker image that
          # ships the full musl toolchain — no host-side curl/apt acrobatics needed.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64-linux-gnu)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install cross (musl targets)
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.os != 'windows-latest'
        run: |
          BINARY=target/${{ matrix.target }}/release/argus
          if [ ! -f "$BINARY" ]; then
            echo "Binary not found at $BINARY" && exit 1
          fi
          tar czf argus-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release argus

      - name: Package (windows)
        if: matrix.os == 'windows-latest'
        run: |
          if (-not (Test-Path "target/${{ matrix.target }}/release/argus.exe")) {
            Write-Error "Binary not found"; exit 1
          }
          7z a argus-${{ matrix.target }}.zip target/${{ matrix.target }}/release/argus.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: argus-${{ matrix.target }}
          path: argus-${{ matrix.target }}.*

  upload:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload binaries to existing release
        run: gh release upload ${{ github.ref_name }} artifacts/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
